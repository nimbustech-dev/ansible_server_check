# API 서버 설정
# 모든 팀원이 공유하는 설정 파일
api_server:
  # 여러 서버에 전송 (우선 사용)
  urls:
    - "http://115.85.181.103:8000/api/checks"  # 배포 서버 1
    - "http://115.85.181.103:8001/api/checks"  # 배포 서버 2
  # 단일 URL (하위 호환성용, urls가 없을 때 사용)
  url: "http://192.168.0.18:8000/api/checks"  # API 서버 주소 (중앙 서버 IP - DB 담당자 PC)
  timeout: 60  # 동시 점검 시 타임아웃 증가
  retry_count: 5  # 동시 점검 시 재시도 횟수 증가

# 기본 담당자 정보 (각 팀원이 자신의 정보로 수정 가능)
default_checker: "강하나"

