<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 콘솔 - 서버 점검 모니터링</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', system-ui, sans-serif; }
    :root {
      --bg: #0b1020;
      --bg-2: #070b15;
      --panel: rgba(17, 24, 39, 0.78);
      --border: rgba(148, 163, 184, 0.16);
      --text: #e5e7eb;
      --muted: #9aa6b2;
      --blue: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --radius: 14px;
    }
    body {
      background: linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      min-height: 100vh;
      padding: 22px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .topbar h1 { font-size: 1.2rem; }
    .topbar a { color: var(--blue); font-size: 0.9rem; }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }
    .tab {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.95rem;
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card {
      padding: 24px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .card-header h2 { font-size: 1rem; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.9rem; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 0.8rem; }
    .badge.pending { background: rgba(245,158,11,0.2); color: var(--amber); }
    .badge.approved { background: rgba(16,185,129,0.2); color: var(--green); }
    .badge.admin { background: rgba(59,130,246,0.2); color: var(--blue); }
    .badge.role-admin { background: rgba(59,130,246,0.25); color: #93c5fd; }
    .badge.role-maintainer { background: rgba(16,185,129,0.25); color: #6ee7b7; }
    .badge.role-operator { background: rgba(245,158,11,0.25); color: #fcd34d; }
    .badge.role-viewer { background: rgba(148,163,184,0.3); color: var(--muted); }
    .badge.check-on { background: rgba(16,185,129,0.25); color: #6ee7b7; }
    .badge.check-off { background: rgba(148,163,184,0.3); color: var(--muted); }
    select.role-select { padding: 6px 8px; border-radius: 6px; background: var(--bg-2); color: var(--text); border: 1px solid var(--border); font-size: 0.85rem; margin-right: 6px; }
    .btn-delete { background: #7f1d1d; color: #fecaca; }
    .btn-edit { background: var(--blue); color: #fff; }
    .btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      margin-right: 8px;
    }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-reject { background: var(--red); color: #fff; }
    .btn:hover { filter: brightness(1.1); }
    .msg { padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; }
    .msg.show { display: block; }
    .msg.error { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .msg.success { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .empty { color: var(--muted); padding: 24px; text-align: center; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      min-width: 360px;
      max-width: 90%;
    }
    .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; color: var(--muted); font-size: 0.85rem; margin-bottom: 4px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text);
    }
    .form-row textarea { min-height: 60px; resize: vertical; }
    .form-row.checkbox { display: flex; align-items: center; gap: 8px; }
    .form-row.checkbox input { width: auto; }
    .modal-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>관리자 콘솔 (Admin Console)</h1>
    <a href="/api/dashboard">대시보드로 돌아가기</a>
  </div>
  <div id="msg" class="msg"></div>
  <div class="tabs">
    <button type="button" class="tab active" data-tab="servers">서버 관리</button>
    <button type="button" class="tab" data-tab="users">회원 관리</button>
  </div>

  <div id="tab-servers" class="tab-content active">
    <div class="card">
      <div class="card-header">
        <h2>점검 대상 서버</h2>
        <button type="button" class="btn btn-approve" onclick="openServerModal()">서버 추가</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>호스트명</th>
            <th>IP</th>
            <th>OS 유형</th>
            <th>SSH 포트</th>
            <th>SSH 사용자</th>
            <th>점검 대상</th>
            <th>비고</th>
            <th>동작</th>
          </tr>
        </thead>
        <tbody id="serverList">
          <tr><td colspan="8" class="empty">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="tab-users" class="tab-content">
    <div class="card">
      <div class="card-header"><h2>회원 목록</h2></div>
      <table>
        <thead>
          <tr>
            <th>아이디</th>
            <th>이메일</th>
            <th>역할</th>
            <th>상태</th>
            <th>가입일</th>
            <th>동작</th>
          </tr>
        </thead>
        <tbody id="userList">
          <tr><td colspan="6" class="empty">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="serverModal" class="modal-overlay">
    <div class="modal">
      <h3 id="serverModalTitle">서버 추가</h3>
      <input type="hidden" id="serverId" value="">
      <div class="form-row">
        <label>호스트명</label>
        <input type="text" id="serverName" placeholder="예: nimbus-server">
      </div>
      <div class="form-row">
        <label>IP</label>
        <input type="text" id="serverIp" placeholder="예: 192.168.0.1">
      </div>
      <div class="form-row">
        <label>OS 유형</label>
        <select id="serverOsType">
          <option value="linux">Linux</option>
          <option value="windows">Windows</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-row">
        <label>SSH 포트</label>
        <input type="number" id="serverSshPort" value="22" min="1" max="65535">
      </div>
      <div class="form-row">
        <label>SSH 사용자</label>
        <input type="text" id="serverSshUser" value="root" placeholder="root">
      </div>
      <div class="form-row checkbox">
        <input type="checkbox" id="serverCheckEnabled" checked>
        <label for="serverCheckEnabled">점검 대상</label>
      </div>
      <div class="form-row">
        <label>비고</label>
        <textarea id="serverMemo" placeholder="선택 입력"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" onclick="closeServerModal()" style="background: var(--muted);">취소</button>
        <button type="button" class="btn btn-approve" onclick="saveServer()">저장</button>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg show ' + (type || 'success');
    }
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', function() {
        const tab = this.dataset.tab;
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        if (tab === 'servers') loadServers();
        if (tab === 'users') loadUsers();
      });
    });

    function roleBadge(role) {
      const r = (role || 'viewer');
      const labels = { admin: 'Admin', maintainer: 'Maintainer', operator: 'Operator', viewer: 'Viewer' };
      return '<span class="badge role-' + r + '">' + (labels[r] || r) + '</span>';
    }
    async function loadMe() {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (res.ok) currentUser = await res.json();
    }

    // ---------- 서버 관리 ----------
    async function loadServers() {
      const tbody = document.getElementById('serverList');
      try {
        const res = await fetch('/api/admin/servers', { credentials: 'include' });
        if (!res.ok) { tbody.innerHTML = '<tr><td colspan="8" class="empty">목록을 불러올 수 없습니다.</td></tr>'; return; }
        const data = await res.json();
        const servers = data.servers || [];
        if (servers.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="empty">등록된 서버가 없습니다. 서버 추가 버튼으로 등록하세요.</td></tr>';
          return;
        }
        tbody.innerHTML = servers.map(s => {
          const checkBadge = s.check_enabled ? '<span class="badge check-on">대상</span>' : '<span class="badge check-off">비대상</span>';
          const toggleLabel = s.check_enabled ? '비활성화' : '활성화';
          return '<tr><td>' + (s.name || '') + '</td><td>' + (s.ip || '') + '</td><td>' + (s.os_type || '-') + '</td><td>' + (s.ssh_port || '22') + '</td><td>' + (s.ssh_user || '-') + '</td><td>' + checkBadge + '</td><td>' + (s.memo || '-') + '</td><td><button class="btn btn-edit" onclick="toggleServerCheck(' + s.id + ',' + !s.check_enabled + ')">' + toggleLabel + '</button> <button class="btn btn-edit" onclick="openServerModal(' + s.id + ')">수정</button> <button class="btn btn-delete" onclick="deleteServer(' + s.id + ')">삭제</button></td></tr>';
        }).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">오류가 발생했습니다.</td></tr>';
      }
    }
    function openServerModal(id) {
      document.getElementById('serverId').value = id || '';
      document.getElementById('serverModalTitle').textContent = id ? '서버 수정' : '서버 추가';
      if (id) {
        fetch('/api/admin/servers/' + id, { credentials: 'include' }).then(r => r.json()).then(data => {
          const s = data.server;
          document.getElementById('serverName').value = s.name || '';
          document.getElementById('serverIp').value = s.ip || '';
          document.getElementById('serverOsType').value = s.os_type || 'linux';
          document.getElementById('serverSshPort').value = s.ssh_port || 22;
          document.getElementById('serverSshUser').value = s.ssh_user || 'root';
          document.getElementById('serverCheckEnabled').checked = s.check_enabled !== false;
          document.getElementById('serverMemo').value = s.memo || '';
        }).catch(() => {});
      } else {
        document.getElementById('serverName').value = '';
        document.getElementById('serverIp').value = '';
        document.getElementById('serverOsType').value = 'linux';
        document.getElementById('serverSshPort').value = 22;
        document.getElementById('serverSshUser').value = 'root';
        document.getElementById('serverCheckEnabled').checked = true;
        document.getElementById('serverMemo').value = '';
      }
      document.getElementById('serverModal').classList.add('show');
    }
    function closeServerModal() {
      document.getElementById('serverModal').classList.remove('show');
    }
    async function saveServer() {
      const id = document.getElementById('serverId').value;
      const payload = {
        name: document.getElementById('serverName').value.trim(),
        ip: document.getElementById('serverIp').value.trim(),
        os_type: document.getElementById('serverOsType').value,
        ssh_port: parseInt(document.getElementById('serverSshPort').value, 10) || 22,
        ssh_user: document.getElementById('serverSshUser').value.trim() || 'root',
        check_enabled: document.getElementById('serverCheckEnabled').checked,
        memo: document.getElementById('serverMemo').value.trim() || null
      };
      if (!payload.name || !payload.ip) { showMsg('호스트명과 IP는 필수입니다.', 'error'); return; }
      try {
        const url = id ? '/api/admin/servers/' + id : '/api/admin/servers';
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, { method: method, credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(id ? payload : payload) });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { showMsg(id ? '수정되었습니다.' : '추가되었습니다.'); closeServerModal(); loadServers(); }
        else showMsg(data.detail || (Array.isArray(data.detail) ? data.detail.map(d => d.msg || d).join(', ') : '실패'), 'error');
      } catch (e) { showMsg('오류가 발생했습니다.', 'error'); }
    }
    async function toggleServerCheck(id, enabled) {
      try {
        const res = await fetch('/api/admin/servers/' + id + '/check-enabled', { method: 'PATCH', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled: enabled }) });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { showMsg(enabled ? '점검 대상으로 설정되었습니다.' : '점검에서 제외되었습니다.'); loadServers(); }
        else showMsg(data.detail || '실패', 'error');
      } catch (e) { showMsg('오류가 발생했습니다.', 'error'); }
    }
    async function deleteServer(id) {
      if (!confirm('이 서버를 삭제하시겠습니까?')) return;
      try {
        const res = await fetch('/api/admin/servers/' + id, { method: 'DELETE', credentials: 'include' });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { showMsg('삭제되었습니다.'); loadServers(); }
        else showMsg(data.detail || '실패', 'error');
      } catch (e) { showMsg('오류가 발생했습니다.', 'error'); }
    }

    // ---------- 회원 관리 ----------
    async function loadUsers() {
      const tbody = document.getElementById('userList');
      try {
        await loadMe();
        const res = await fetch('/api/admin/users', { credentials: 'include' });
        if (!res.ok) { tbody.innerHTML = '<tr><td colspan="6" class="empty">목록을 불러올 수 없습니다.</td></tr>'; return; }
        const data = await res.json();
        const users = data.users || [];
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">가입된 사용자가 없습니다.</td></tr>';
          return;
        }
        const isAdmin = currentUser && currentUser.role === 'admin';
        tbody.innerHTML = users.map(u => {
          const status = u.is_approved ? '<span class="badge approved">승인</span>' : '<span class="badge pending">대기</span>';
          const created = u.created_at ? new Date(u.created_at).toLocaleString('ko-KR') : '-';
          let actions = '';
          if (currentUser && u.id !== currentUser.id) {
            if (!u.is_admin) {
              actions = u.is_approved
                ? '<button class="btn btn-reject" onclick="reject(' + u.id + ')">승인 취소</button>'
                : '<button class="btn btn-approve" onclick="approve(' + u.id + ')">승인</button> <button class="btn btn-reject" onclick="reject(' + u.id + ')">거부</button>';
            }
            if (isAdmin) {
              actions += ' <select class="role-select" onchange="setRole(' + u.id + ', this.value)"><option value="viewer"' + (u.role === 'viewer' ? ' selected' : '') + '>Viewer</option><option value="operator"' + (u.role === 'operator' ? ' selected' : '') + '>Operator</option><option value="maintainer"' + (u.role === 'maintainer' ? ' selected' : '') + '>Maintainer</option><option value="admin"' + (u.role === 'admin' ? ' selected' : '') + '>Admin</option></select>';
              actions += ' <button class="btn btn-delete" onclick="delUser(' + u.id + ')">삭제</button>';
            }
          }
          if (!actions) actions = '-';
          return '<tr><td>' + (u.username || '') + '</td><td>' + (u.email || '-') + '</td><td>' + roleBadge(u.role) + '</td><td>' + status + '</td><td>' + created + '</td><td>' + actions + '</td></tr>';
        }).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">오류가 발생했습니다.</td></tr>';
      }
    }
    async function approve(id) {
      try {
        const res = await fetch('/api/admin/users/' + id + '/approve', { method: 'POST', credentials: 'include' });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { showMsg('승인되었습니다.'); loadUsers(); }
        else showMsg(data.detail || '실패', 'error');
      } catch (e) { showMsg('오류가 발생했습니다.', 'error'); }
    }
    async function reject(id) {
      try {
        const res = await fetch('/api/admin/users/' + id + '/reject', { method: 'POST', credentials: 'include' });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { showMsg('거부 처리되었습니다.'); loadUsers(); }
        else showMsg(data.detail || '실패', 'error');
      } catch (e) { showMsg('오류가 발생했습니다.', 'error'); }
    }
    async function setRole(id, role) {
      try {
        const res = await fetch('/api/admin/users/' + id + '/role', { method: 'PATCH', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ role: role }) });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { showMsg('역할이 변경되었습니다.'); loadUsers(); }
        else showMsg(data.detail || '실패', 'error');
      } catch (e) { showMsg('오류가 발생했습니다.', 'error'); }
    }
    async function delUser(id) {
      if (!confirm('이 사용자를 삭제하시겠습니까?')) return;
      try {
        const res = await fetch('/api/admin/users/' + id, { method: 'DELETE', credentials: 'include' });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { showMsg('삭제되었습니다.'); loadUsers(); }
        else showMsg(data.detail || '실패', 'error');
      } catch (e) { showMsg('오류가 발생했습니다.', 'error'); }
    }

    loadMe().then(() => { loadServers(); loadUsers(); });
  </script>
</body>
</html>
