<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 점검 결과 모니터링 대시보드</title>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('reportTheme') || 'dark');</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Always-dark theme (aligned with dashboard) */
            --bg: #0b1020;
            --panel: rgba(17, 24, 39, 0.78);
            --border: rgba(148, 163, 184, 0.16);
            --text: #e5e7eb;
            --muted: #9aa6b2;
            --primary: rgba(59, 130, 246, 0.95);
            --primary-2: rgba(37, 99, 235, 0.95);
            --success: #10b981;
            --shadow: 0 18px 50px rgba(0,0,0,0.55);
            --shadow-sm: 0 10px 26px rgba(0,0,0,0.45);
            --radius: 14px;
            --table-head: rgba(2, 6, 23, 0.88);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background:
                radial-gradient(1000px circle at 10% 0%, rgba(59,130,246,0.18), transparent 55%),
                radial-gradient(900px circle at 90% 20%, rgba(16,185,129,0.10), transparent 55%),
                radial-gradient(700px circle at 50% 110%, rgba(239,68,68,0.10), transparent 60%),
                linear-gradient(180deg, var(--bg), #070b15);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .dashboard-container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .header-info {
            color: #718096;
            font-size: 14px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .header-info span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #48bb78;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 탭 스타일 */
        .tabs-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 0;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            overflow: hidden;
        }
        
        .tabs-header {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
        }
        
        .tab-button {
            flex: 1;
            padding: 20px 30px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #718096;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .tab-button.active {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
        }
        
        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, rgba(59,130,246,0.95) 0%, rgba(37,99,235,0.95) 100%);
        }
        
        .tab-button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }
        
        .tab-content {
            display: none;
            min-height: 600px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .tab-content iframe {
            width: 100%;
            height: calc(100vh - 250px);
            min-height: 600px;
            border: none;
            background: transparent;
            display: block;
        }
        
        .tab-content:not(.active) {
            display: none !important;
        }
        
        .tab-content:not(.active) iframe {
            display: none !important;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: #718096;
            font-size: 18px;
        }
        
        .loading::before {
            content: '';
            width: 14px;
            height: 14px;
            margin-right: 10px;
            border-radius: 999px;
            border: 2px solid rgba(15, 23, 42, 0.18);
            border-top-color: rgba(15, 23, 42, 0.60);
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ==========================
           [data-theme="dark"] – 다크 모드 (기본)
           ========================== */
        [data-theme="dark"] .header,
        [data-theme="dark"] .tabs-container {
            background: var(--panel) !important;
            border: 1px solid var(--border) !important;
            box-shadow: var(--shadow) !important;
            border-radius: var(--radius) !important;
            backdrop-filter: none !important;
        }

        [data-theme="dark"] .header h1 {
            color: var(--text) !important;
            letter-spacing: -0.02em;
        }

        [data-theme="dark"] .header-info {
            color: var(--muted) !important;
        }

        [data-theme="dark"] .status-indicator {
            background: var(--success) !important;
            animation: none !important;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.14);
        }

        [data-theme="dark"] .tabs-header {
            background: rgba(15, 23, 42, 0.9) !important;
            border-bottom: 1px solid var(--border) !important;
        }

        [data-theme="dark"] .tab-button {
            color: var(--muted) !important;
        }

        [data-theme="dark"] .tab-button.active {
            color: var(--text) !important;
        }

        [data-theme="dark"] .tab-button.active::after {
            background: var(--primary) !important;
        }

        [data-theme="dark"] .tab-button:hover {
            background: rgba(30, 58, 138, 0.06) !important;
            color: var(--primary) !important;
        }

        [data-theme="dark"] .tab-content iframe {
            border-radius: calc(var(--radius) - 4px);
            box-shadow: var(--shadow-sm);
        }

        /* [data-theme="light"] – 라이트 모드 */
        [data-theme="light"] body {
            background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
            color: #1e293b;
        }

        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .theme-toggle { display: flex; gap: 4px; }
        .btn-theme { padding: 8px 14px; font-size: 13px; border-radius: 8px; border: 1px solid rgba(148,163,184,0.2); cursor: pointer; font-weight: 600; background: transparent; color: inherit; }
        [data-theme="dark"] .btn-theme#themeDark { background: var(--primary) !important; color: #fff !important; border-color: var(--primary); }
        [data-theme="dark"] .btn-theme#themeLight { background: rgba(255,255,255,0.04); color: var(--muted); }
        [data-theme="light"] .btn-theme#themeDark { background: #e2e8f0; color: #64748b; }
        [data-theme="light"] .btn-theme#themeLight { background: #1e3a8a; color: #fff; border-color: #1e3a8a; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="header-left">
                <h1>통합 점검 결과 모니터링 대시보드</h1>
                <div class="header-info" id="headerInfo">
                    <span><span class="status-indicator"></span> 실시간 모니터링</span>
                    <span>DB / OS / WAS 통합 리포트</span>
                    <span id="updateTime">업데이트: -</span>
                </div>
            </div>
            <span class="theme-toggle" role="group" aria-label="테마 선택">
                <button type="button" class="btn-theme" id="themeDark" title="다크 모드">다크</button>
                <button type="button" class="btn-theme" id="themeLight" title="라이트 모드">라이트</button>
            </span>
        </div>
        
        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-button active" onclick="switchTab('db')" id="tab-db-btn">DB 점검 결과</button>
                <button class="tab-button" onclick="switchTab('os')" id="tab-os-btn">OS 점검 결과</button>
                <button class="tab-button" onclick="switchTab('was')" id="tab-was-btn">WAS 점검 결과</button>
            </div>
            
            <div class="tab-content active" id="tab-db">
                <iframe id="db-frame" src="/api/db-checks/report" frameborder="0" style="width: 100%; height: calc(100vh - 250px); min-height: 600px; border: none; background: transparent;"></iframe>
            </div>
            
            <div class="tab-content" id="tab-os">
                <iframe id="os-frame" src="/api/os-checks/report?t=" frameborder="0" style="width: 100%; height: calc(100vh - 250px); min-height: 600px; border: none; background: transparent;"></iframe>
            </div>
            
            <div class="tab-content" id="tab-was">
                <iframe id="was-frame" src="/api/was-checks/report" frameborder="0" style="width: 100%; height: calc(100vh - 250px); min-height: 600px; border: none; background: transparent;"></iframe>
            </div>
        </div>
    </div>
    
    <script>
        const REPORT_MESSAGE = { type: 'tab_activated' };

        // 탭 전환 함수
        function switchTab(tabName) {
            // 모든 탭 버튼 비활성화
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 모든 탭 콘텐츠 숨기기
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // 선택한 탭 활성화
            const tabButton = document.getElementById(`tab-${tabName}-btn`);
            const tabContent = document.getElementById(`tab-${tabName}`);
            const tabFrame = document.getElementById(`${tabName}-frame`);
            
            if (tabButton && tabContent && tabFrame) {
                tabButton.classList.add('active');
                tabContent.classList.add('active');

                // OS 탭인 경우 iframe 강제 새로고침 (캐시 무시)
                if (tabName === 'os') {
                    const currentSrc = tabFrame.src.split('?')[0];
                    tabFrame.src = currentSrc + '?t=' + Date.now();
                }

                // 탭이 활성화되는 순간, iframe 내부에 레이아웃 재계산 요청
                // (비활성 탭에서 display:none 상태로 로드되면 offsetWidth=0 이슈가 생길 수 있음)
                try {
                    setTimeout(() => {
                        if (tabFrame && tabFrame.contentWindow) {
                            tabFrame.contentWindow.postMessage(REPORT_MESSAGE, window.location.origin);
                        }
                    }, 0);
                } catch (e) {}
            }
            
            // 업데이트 시간 갱신
            updateTime();
        }
        
        // 업데이트 시간 표시
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('ko-KR', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('updateTime').textContent = `업데이트: ${timeStr}`;
        }
        
        const THEME_KEY = 'reportTheme';
        function getTheme() { return localStorage.getItem(THEME_KEY) || 'dark'; }
        function setTheme(theme) {
            theme = theme === 'light' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem(THEME_KEY, theme);
            var d = document.getElementById('themeDark');
            var l = document.getElementById('themeLight');
            if (d) d.classList.toggle('active', theme === 'dark');
            if (l) l.classList.toggle('active', theme === 'light');
        }
        function initTheme() {
            setTheme(getTheme());
            document.getElementById('themeDark').addEventListener('click', function() { setTheme('dark'); });
            document.getElementById('themeLight').addEventListener('click', function() { setTheme('light'); });
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            updateTime();
            setInterval(updateTime, 60000);
        });
        
        // iframe 로드 완료 시 처리
        window.addEventListener('message', function(event) {
            // iframe에서 메시지를 받을 수 있도록 준비
            console.log('Message received from iframe:', event.data);
        });
    </script>
</body>
</html>
