<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점검 결과 JSON 뷰어</title>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('reportTheme') || 'dark');</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root{
            --bg: #0b1020;
            --bg2: #070b15;
            --panel: rgba(17, 24, 39, 0.78);
            --border: rgba(148, 163, 184, 0.16);
            --text: #e5e7eb;
            --muted: #9aa6b2;
            --blue: rgba(59, 130, 246, 0.95);
            --blue2: rgba(37, 99, 235, 0.95);
            --shadow: 0 18px 50px rgba(0,0,0,0.55);
            --shadow-sm: 0 10px 26px rgba(0,0,0,0.45);
            --radius: 14px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background:
                radial-gradient(1000px circle at 10% 0%, rgba(59,130,246,0.18), transparent 55%),
                radial-gradient(900px circle at 90% 20%, rgba(16,185,129,0.10), transparent 55%),
                radial-gradient(700px circle at 50% 110%, rgba(239,68,68,0.10), transparent 60%),
                linear-gradient(180deg, var(--bg), var(--bg2));
            padding: 20px;
            color: var(--text);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--panel);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
            color: #061023;
            padding: 20px 30px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .controls {
            padding: 20px 30px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(148,163,184,0.14);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        label {
            font-weight: 600;
            color: var(--muted);
            font-size: 14px;
        }
        
        select, input, button {
            padding: 8px 12px;
            border: 1px solid rgba(148,163,184,0.18);
            border-radius: 12px;
            font-size: 14px;
        }
        
        select, input {
            background: rgba(255,255,255,0.04);
            color: var(--text);
            outline: none;
        }

        select:focus, input:focus {
            border-color: rgba(59,130,246,0.65);
            background: rgba(255,255,255,0.06);
        }
        
        button {
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
            color: #061023;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        button:hover {
            filter: brightness(1.05);
        }
        button:focus-visible, .btn-theme:focus-visible {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .info {
            padding: 15px 30px;
            background: rgba(59,130,246,0.10);
            border-left: 4px solid rgba(59,130,246,0.85);
            margin: 0 30px;
            margin-top: 20px;
            border-radius: 12px;
            color: var(--text);
        }
        
        .info strong {
            color: rgba(59,130,246,0.95);
        }
        
        .json-container {
            padding: 30px;
            overflow-x: auto;
        }
        
        pre {
            background: rgba(2, 6, 23, 0.88);
            color: #d6e0ff;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid rgba(148,163,184,0.14);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
        
        .error {
            background: rgba(245, 158, 11, 0.14);
            border: 1px solid rgba(245, 158, 11, 0.35);
            color: #fbbf24;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 30px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            padding: 15px 30px;
            background: var(--stats-bg, rgba(15, 23, 42, 0.9));
            border-bottom: 1px solid var(--border);
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        /* [data-theme="light"] – 라이트 모드 */
        [data-theme="light"] {
            --bg: #f1f5f9;
            --bg2: #e2e8f0;
            --panel: rgba(255,255,255,0.98);
            --border: rgba(0,0,0,0.08);
            --text: #1e293b;
            --muted: #64748b;
            --stats-bg: #f8fafc;
        }
        [data-theme="light"] body {
            background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
            color: var(--text);
        }
        [data-theme="light"] .header { color: #061023; }
        [data-theme="light"] pre {
            background: #f1f5f9;
            color: #334155;
            border-color: rgba(0,0,0,0.08);
        }
        .theme-toggle { display: inline-flex; gap: 4px; }
        .btn-theme { padding: 8px 14px; font-size: 13px; border-radius: 8px; border: 1px solid rgba(148,163,184,0.2); cursor: pointer; font-weight: 600; background: transparent; color: inherit; }
        [data-theme="dark"] .btn-theme#themeDark { background: linear-gradient(135deg, var(--blue), var(--blue2)); color: #061023; border-color: transparent; }
        [data-theme="dark"] .btn-theme#themeLight { background: rgba(255,255,255,0.04); color: var(--muted); }
        [data-theme="light"] .btn-theme#themeDark { background: #e2e8f0; color: #64748b; }
        [data-theme="light"] .btn-theme#themeLight { background: #1e3a8a; color: #fff; border-color: #1e3a8a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 점검 결과 JSON 뷰어</h1>
            <p>데이터베이스에 저장된 점검 결과를 JSON 형태로 확인합니다</p>
        </div>
        
        <div class="controls">
            <span class="theme-toggle" role="group" aria-label="테마 선택">
                <button type="button" class="btn-theme" id="themeDark" title="다크 모드">다크</button>
                <button type="button" class="btn-theme" id="themeLight" title="라이트 모드">라이트</button>
            </span>
            <div class="control-group">
                <label for="checkType">점검 유형:</label>
                <select id="checkType">
                    <option value="all">전체</option>
                    <option value="mariadb">MariaDB</option>
                    <option value="postgresql">PostgreSQL</option>
                    <option value="cubrid">CUBRID</option>
                    <option value="os">OS</option>
                    <option value="was">WAS/Tomcat</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="limit">최대 개수:</label>
                <input type="number" id="limit" value="10" min="1" max="1000" style="width: 80px;">
            </div>
            
            <div class="control-group">
                <label for="format">데이터 형식:</label>
                <select id="format">
                    <option value="formatted">포맷된 데이터 (테이블용)</option>
                    <option value="raw">원본 데이터 (전체 JSON)</option>
                </select>
            </div>
            
            <button onclick="loadData()">🔄 데이터 불러오기</button>
            <button onclick="copyToClipboard()">📋 복사</button>
            <span style="margin-left: 8px;">내보내기 형식:</span>
            <label class="chip" style="margin-left: 4px;"><input type="radio" name="exportFormat" value="json" checked> JSON</label>
            <label class="chip"><input type="radio" name="exportFormat" value="csv"> CSV</label>
            <button onclick="downloadJsonFile()">💾 내보내기</button>
        </div>
        
        <div id="stats" class="stats" style="display: none;">
            <div class="stat-item">
                <span class="stat-label">총 개수</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">표시 개수</span>
                <span class="stat-value" id="displayCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">마지막 업데이트</span>
                <span class="stat-value" id="lastUpdate" style="font-size: 14px;">-</span>
            </div>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div class="json-container">
            <div id="loading" class="loading">데이터를 불러오는 중...</div>
            <pre id="jsonOutput" style="display: none;"></pre>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        function getApiUrl(checkType, format) {
            if (format === 'raw') {
                if (checkType === 'all') {
                    return `${API_BASE}/api/checks?limit=${document.getElementById('limit').value}`;
                } else {
                    return `${API_BASE}/api/checks?check_type=${checkType}&limit=${document.getElementById('limit').value}`;
                }
            } else {
                // 포맷된 데이터
                if (checkType === 'mariadb' || checkType === 'postgresql' || checkType === 'cubrid') {
                    return `${API_BASE}/api/db-checks/data?limit=${document.getElementById('limit').value}`;
                } else if (checkType === 'os') {
                    return `${API_BASE}/api/os-checks/data?limit=${document.getElementById('limit').value}`;
                } else if (checkType === 'was') {
                    return `${API_BASE}/api/was-checks/data?limit=${document.getElementById('limit').value}`;
                } else {
                    // 전체인 경우 모든 데이터 가져오기
                    return `${API_BASE}/api/checks?limit=${document.getElementById('limit').value}`;
                }
            }
        }
        
        async function loadData() {
            const checkType = document.getElementById('checkType').value;
            const format = document.getElementById('format').value;
            const limit = document.getElementById('limit').value;
            
            const loading = document.getElementById('loading');
            const jsonOutput = document.getElementById('jsonOutput');
            const error = document.getElementById('error');
            const stats = document.getElementById('stats');
            
            loading.style.display = 'block';
            jsonOutput.style.display = 'none';
            error.style.display = 'none';
            stats.style.display = 'none';
            
            try {
                const url = getApiUrl(checkType, format);
                console.log('Loading from:', url);
                
                const response = await fetch(url + '&t=' + Date.now(), {
                    cache: 'no-cache',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // JSON을 예쁘게 포맷
                const formattedJson = JSON.stringify(data, null, 2);
                
                // 구문 강조 (간단한 버전)
                const highlighted = highlightJson(formattedJson);
                
                jsonOutput.innerHTML = highlighted;
                jsonOutput.style.display = 'block';
                loading.style.display = 'none';
                
                // 통계 업데이트
                if (data.count !== undefined) {
                    document.getElementById('totalCount').textContent = data.count;
                    document.getElementById('displayCount').textContent = data.results ? data.results.length : 0;
                } else if (data.results) {
                    document.getElementById('totalCount').textContent = data.results.length;
                    document.getElementById('displayCount').textContent = data.results.length;
                }
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ko-KR');
                stats.style.display = 'flex';
                
            } catch (err) {
                loading.style.display = 'none';
                error.textContent = `오류 발생: ${err.message}`;
                error.style.display = 'block';
                console.error('Error loading data:', err);
            }
        }
        
        function highlightJson(json) {
            return json
                .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
                    let cls = 'number';
                    if (/^"/.test(match)) {
                        if (/:$/.test(match)) {
                            cls = 'key';
                        } else {
                            cls = 'string';
                        }
                    } else if (/true|false/.test(match)) {
                        cls = 'boolean';
                    } else if (/null/.test(match)) {
                        cls = 'null';
                    }
                    return '<span class="' + cls + '">' + escapeHtml(match) + '</span>';
                });
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        function getExportFormat() {
            const radio = document.querySelector('input[name="exportFormat"]:checked');
            return (radio && radio.value) || 'json';
        }
        
        function getExportUrl() {
            const checkType = document.getElementById('checkType').value;
            const limit = document.getElementById('limit').value;
            const fmt = getExportFormat();
            let url = `${API_BASE}/api/checks/export?limit=${limit}&format=${encodeURIComponent(fmt)}`;
            if (checkType && checkType !== 'all') url += `&check_type=${encodeURIComponent(checkType)}`;
            return url;
        }
        
        async function downloadJsonFile() {
            const url = getExportUrl();
            const fmt = getExportFormat();
            const filename = fmt === 'csv' ? 'check_results.csv' : 'check_results.json';
            try {
                const res = await fetch(url, { credentials: 'include' });
                if (!res.ok) {
                    if (res.status === 401) alert('로그인이 필요합니다.');
                    else alert('내보내기 실패: ' + res.status);
                    return;
                }
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
                URL.revokeObjectURL(a.href);
            } catch (e) {
                alert('내보내기 중 오류: ' + e.message);
            }
        }
        
        function copyToClipboard() {
            const jsonOutput = document.getElementById('jsonOutput');
            if (!jsonOutput || jsonOutput.style.display === 'none') {
                alert('먼저 "데이터 불러오기" 버튼으로 데이터를 불러온 뒤 복사할 수 있습니다.');
                return;
            }
            const text = jsonOutput.textContent || '';
            if (!text.trim()) {
                alert('표시할 데이터가 없습니다. 먼저 데이터를 불러오세요.');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                alert('JSON 데이터가 클립보드에 복사되었습니다!');
            }).catch(err => {
                console.error('복사 실패:', err);
                alert('복사에 실패했습니다. 수동으로 선택하여 복사하세요.');
            });
        }
        
        const THEME_KEY = 'reportTheme';
        function getTheme() { return localStorage.getItem(THEME_KEY) || 'dark'; }
        function setTheme(theme) {
            theme = theme === 'light' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem(THEME_KEY, theme);
            var d = document.getElementById('themeDark');
            var l = document.getElementById('themeLight');
            if (d) d.classList.toggle('active', theme === 'dark');
            if (l) l.classList.toggle('active', theme === 'light');
        }
        function initTheme() {
            setTheme(getTheme());
            var d = document.getElementById('themeDark');
            var l = document.getElementById('themeLight');
            if (d) d.addEventListener('click', () => setTheme('dark'));
            if (l) l.addEventListener('click', () => setTheme('light'));
        }
        initTheme();

        // 페이지 로드 시 자동으로 데이터 불러오기
        window.addEventListener('load', () => {
            loadData();
        });
        
        // Enter 키로도 불러오기
        document.getElementById('limit').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadData();
            }
        });
    </script>
    
    <style>
        pre .string { color: #98c379; }
        pre .number { color: #d19a66; }
        pre .boolean { color: #56b6c2; }
        pre .null { color: #c678dd; }
        pre .key { color: #e06c75; }
    </style>
</body>
</html>
