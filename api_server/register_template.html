<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 서버 점검 모니터링</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', system-ui, sans-serif; }
    :root {
      --bg: #0b1020;
      --bg-2: #070b15;
      --panel: rgba(17, 24, 39, 0.78);
      --border: rgba(148, 163, 184, 0.16);
      --text: #e5e7eb;
      --muted: #9aa6b2;
      --blue: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
      --radius: 14px;
    }
    body {
      background: linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      padding: 32px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 18px 50px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.35rem; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.9rem; margin-bottom: 6px; color: var(--muted); }
    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      color: var(--text);
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: var(--blue); }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .msg { margin-top: 14px; padding: 10px; border-radius: 8px; font-size: 0.9rem; display: none; }
    .msg.error { background: rgba(239,68,68,0.15); color: #fca5a5; display: block; }
    .msg.success { background: rgba(16,185,129,0.15); color: #6ee7b7; display: block; }
    .links { margin-top: 20px; text-align: center; }
    .links a { color: var(--blue); font-size: 0.9rem; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>회원가입</h1>
    <p class="sub">관리자 승인 후 로그인할 수 있습니다.</p>
    <form id="registerForm">
      <div class="form-group">
        <label for="username">아이디 *</label>
        <input type="text" id="username" name="username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">비밀번호 *</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="email">이메일 (선택)</label>
        <input type="email" id="email" name="email" autocomplete="email" />
      </div>
      <div id="msg" class="msg"></div>
      <button type="submit" class="btn btn-primary">가입하기</button>
    </form>
    <div class="links">
      <a href="/login">로그인</a>
    </div>
  </div>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.className = 'msg';
      msg.textContent = '';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const email = document.getElementById('email').value.trim() || null;
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, email: email || undefined }),
          credentials: 'include'
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          msg.className = 'msg success';
          msg.textContent = data.message || '가입이 완료되었습니다. 관리자 승인 후 로그인해 주세요.';
          msg.innerHTML += ' <a href="/login">로그인 페이지로 이동</a>';
          document.getElementById('registerForm').reset();
          return;
        }
        msg.className = 'msg error';
        msg.textContent = data.detail || (Array.isArray(data.detail) ? data.detail.map(x => x.msg).join(' ') : '가입에 실패했습니다.');
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = '네트워크 오류가 발생했습니다.';
      }
    });
  </script>
</body>
</html>
