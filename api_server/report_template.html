<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB 점검 결과 모니터링 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* NeoGlass Dark */
            --bg: #0b1020;
            --panel: rgba(17, 25, 40, 0.62);
            --border: rgba(148, 163, 184, 0.18);
            --text: #e5e7eb;
            --muted: rgba(203, 213, 225, 0.72);
            --primary: #5eead4;
            --primary-2: #38bdf8;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #fb7185;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
            --shadow-sm: 0 10px 30px rgba(0, 0, 0, 0.45);
            --radius: 16px;
            --table-head: rgba(15, 23, 42, 0.90);
            --glass-blur: 18px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background:
                radial-gradient(900px circle at 12% 0%, rgba(94, 234, 212, 0.18), transparent 55%),
                radial-gradient(900px circle at 86% 10%, rgba(56, 189, 248, 0.16), transparent 55%),
                radial-gradient(700px circle at 50% 110%, rgba(251, 113, 133, 0.10), transparent 60%),
                var(--bg);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 커스텀 스크롤바 - 다크 테마 */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(94, 234, 212, 0.4) rgba(15, 23, 42, 0.3);
        }

        *::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        *::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
            border-radius: 10px;
        }

        *::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(94, 234, 212, 0.5), rgba(56, 189, 248, 0.5));
            border-radius: 10px;
            border: 2px solid rgba(15, 23, 42, 0.3);
            transition: all 0.3s ease;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(94, 234, 212, 0.7), rgba(56, 189, 248, 0.7));
            border-color: rgba(15, 23, 42, 0.5);
        }

        *::-webkit-scrollbar-thumb:active {
            background: linear-gradient(180deg, var(--primary), var(--primary-2));
        }

        *::-webkit-scrollbar-corner {
            background: rgba(15, 23, 42, 0.3);
        }
        
        .dashboard-container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .header-left {
            flex: 1;
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .header-info {
            color: #718096;
            font-size: 14px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .header-info span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #48bb78;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .btn-secondary:hover {
            background: #cbd5e0;
        }
        
        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.12), rgba(220, 38, 38, 0.08));
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 20px;
            padding: 28px 32px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            backdrop-filter: blur(10px);
            animation: heroSlideIn 0.5s ease-out;
        }

        @keyframes heroSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-icon {
            font-size: 48px;
            animation: heroPulse 2s infinite;
        }

        @keyframes heroPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .hero-content {
            flex: 1;
        }

        .hero-content h2 {
            color: #991b1b;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .hero-content p {
            color: #dc2626;
            font-size: 14px;
            font-weight: 600;
        }

        .hero-action {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .hero-action:hover {
            background: #b91c1c;
            transform: translateX(4px);
        }

        /* Updated Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel);
            backdrop-filter: blur(var(--glass-blur));
            border-radius: 20px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .header h1 {
            color: var(--text);
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--muted);
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            color: #10b981;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: livePulse 2s infinite;
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .quick-stats {
            display: flex;
            gap: 20px;
            padding: 12px 20px;
            background: rgba(15, 23, 42, 0.35);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .quick-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .quick-stat-value {
            font-size: 24px;
            font-weight: 800;
            line-height: 1;
        }

        .quick-stat-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }

        .quick-stat.success .quick-stat-value {
            color: var(--success);
        }

        .quick-stat.warning .quick-stat-value {
            color: var(--warning);
        }

        .quick-stat.error .quick-stat-value {
            color: var(--danger);
        }

        .btn-refresh {
            background: var(--primary);
            color: #0a0e1a;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-refresh:hover {
            background: #2dd4bf;
            transform: scale(1.05);
        }

        /* Smart Search Section */
        .search-section {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(var(--glass-blur));
            box-shadow: var(--shadow-sm);
        }

        .search-bar {
            position: relative;
            margin-bottom: 20px;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.5;
        }

        .search-bar input {
            width: 100%;
            padding: 16px 20px 16px 56px;
            background: rgba(15, 23, 42, 0.4);
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 15px;
            color: var(--text);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.6);
        }

        .search-bar input::placeholder {
            color: var(--muted);
        }

        .clear-search {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(148, 163, 184, 0.2);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            color: var(--muted);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .clear-search:hover {
            background: rgba(148, 163, 184, 0.3);
            color: var(--text);
        }

        .filter-chips {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 10px 20px;
            background: rgba(15, 23, 42, 0.3);
            border: 2px solid transparent;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-chip:hover {
            background: rgba(15, 23, 42, 0.5);
            color: var(--text);
        }

        .filter-chip.active {
            background: rgba(94, 234, 212, 0.15);
            border-color: var(--primary);
            color: var(--primary);
        }

        .chip-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .chip-dot.success {
            background: var(--success);
        }

        .chip-dot.error {
            background: var(--danger);
        }

        .chip-dot.warning {
            background: var(--warning);
        }

        .db-type-tabs {
            display: flex;
            gap: 8px;
            background: rgba(15, 23, 42, 0.3);
            padding: 6px;
            border-radius: 16px;
        }

        .db-tab {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .db-tab:hover {
            color: var(--text);
        }

        .db-tab.active {
            background: rgba(94, 234, 212, 0.15);
            color: var(--primary);
        }

        .tab-count {
            background: rgba(15, 23, 42, 0.5);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
        }

        .db-tab.active .tab-count {
            background: rgba(94, 234, 212, 0.25);
        }

        /* Active Filters */
        .active-filters {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 20px;
        }

        .active-filters-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .active-filters-list {
            display: flex;
            gap: 8px;
            flex: 1;
            flex-wrap: wrap;
        }

        .active-filter-tag {
            background: rgba(56, 189, 248, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary-2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .active-filter-tag button {
            background: none;
            border: none;
            color: var(--primary-2);
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .clear-all-filters {
            background: rgba(56, 189, 248, 0.2);
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-2);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .clear-all-filters:hover {
            background: rgba(56, 189, 248, 0.3);
        }

        /* Mini Charts */
        .mini-charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .mini-chart {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(var(--glass-blur));
            box-shadow: var(--shadow-sm);
        }

        .mini-chart canvas {
            max-height: 200px;
        }
        
        .filter-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .filter-section h3 {
            color: #2d3748;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .filter-group select,
        .filter-group input {
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            color: #2d3748;
            transition: border-color 0.3s ease;
            min-width: 150px;
        }
        
        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #1e3a8a;
        }
        
        .table-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .table-section h3 {
            color: #2d3748;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .table-scroll-container {
            position: relative;
        }
        
        .table-scrollbar-top {
            width: 100%;
            height: 20px;
            overflow-x: scroll; /* 항상 스크롤바 표시 */
            overflow-y: hidden;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #f8f9fa;
            display: block;
        }
        
        .table-scrollbar-top::-webkit-scrollbar {
            height: 12px;
        }
        
        .table-scrollbar-top::-webkit-scrollbar-track {
            background: #e9ecef;
            border-radius: 6px;
        }
        
        .table-scrollbar-top::-webkit-scrollbar-thumb {
            background: #1e3a8a;
            border-radius: 6px;
            border: 2px solid #e9ecef;
        }
        
        .table-scrollbar-top::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
            cursor: pointer;
        }
        
        .table-scrollbar-top-content {
            height: 1px;
            min-width: 100%;
        }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
        }
        
        .table-wrapper::-webkit-scrollbar {
            display: none; /* 아래쪽 스크롤 바 숨김 */
        }
        
        .table-wrapper {
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 2000px;
            font-size: 13px;
            background: white;
        }
        
        thead {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: background-color 0.2s ease;
        }
        
        tbody tr:nth-child(even) {
            background-color: #f7fafc;
        }
        
        tbody tr:hover {
            background-color: #edf2f7;
        }
        
        tbody tr.error-row {
            cursor: pointer;
        }
        
        tbody tr.error-row:hover {
            background-color: #fed7d7;
            box-shadow: 0 2px 4px rgba(245, 101, 101, 0.2);
        }
        
        td {
            padding: 12px;
            border-right: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        
        .status-success {
            color: #48bb78;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-success::before {
            content: '●';
            font-size: 8px;
        }
        
        .status-error {
            color: #f56565;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-error::before {
            content: '●';
            font-size: 8px;
        }
        
        .status-warning {
            color: #ed8936;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-warning::before {
            content: '●';
            font-size: 8px;
        }
        
        .check-ok {
            color: #48bb78;
            font-size: 18px;
            font-weight: bold;
        }
        
        .check-fail {
            color: #f56565;
            font-size: 18px;
            font-weight: bold;
        }
        
        /* Modern Timeline-style Cards */
        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .result-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            backdrop-filter: blur(var(--glass-blur));
            box-shadow: var(--shadow-sm);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
        }
        
        .result-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--primary), var(--primary-2));
            border-radius: 16px 0 0 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .result-card:hover::before {
            opacity: 1;
        }
        
        .result-card:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow);
            border-color: rgba(94, 234, 212, 0.35);
        }
        
        .result-card.error-card {
            border-color: rgba(251, 113, 133, 0.45);
            background: linear-gradient(135deg, rgba(251, 113, 133, 0.08), var(--panel));
        }
        
        .result-card.error-card::before {
            background: linear-gradient(180deg, #dc2626, #ef4444);
            opacity: 1;
        }
        
        .result-card.error-card:hover {
            box-shadow: 0 16px 40px rgba(239, 68, 68, 0.25);
        }
        
        .result-card.success-card {
            border-color: rgba(52, 211, 153, 0.35);
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.05), var(--panel));
        }
        
        .result-card.success-card::before {
            background: linear-gradient(180deg, #059669, #10b981);
        }

        /* Card Left: Status Indicator */
        .card-status-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .status-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
        }

        .status-icon.success {
            background: rgba(16, 185, 129, 0.15);
        }

        .status-icon.error {
            background: rgba(239, 68, 68, 0.15);

        @keyframes errorShake {
            0%, 96%, 100% { transform: translateX(0); }
            97%, 99% { transform: translateX(-2px); }
            98% { transform: translateX(2px); }

            background: rgba(251, 191, 36, 0.15);

        .status-badge-small {

            font-size: 11px;
            font-weight: 700;

        .card-expand-btn {

        /* 뷰 전환 버튼 */

            border-radius: 12px;
        }
        
        .view-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;

        .view-btn:hover {

        .view-btn.active {

        .results-info {

        }

        .loading {

        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .no-data {
            text-align: center;
            padding: 60px;
            color: #a0aec0;
            font-size: 16px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;

        }
        
        .badge-mariadb {

        }
        
        .badge-postgresql {

        }
        
        .badge-cubrid {
            background: #fef5e7;

        }
        
        /* 모달 스타일 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;

            border-left-color: #48bb78;
        }

        /* ==========================
           NeoGlass Dark overrides
           - 기존 기능/레이아웃 유지

        .header,
        .stat-card,
        .chart-card,
        .filter-section,

        .header h1 {
            color: var(--text) !important;

        .header-info,

        .btn-secondary:hover {

        /* 카드 다크 테마 */
        .result-card {

        .result-card.error-card {

        .card-field-value.path {

        .card-footer {

        }

        .card-checker {

        }

        .card-status.status-success {
            background: rgba(52, 211, 153, 0.18) !important;
            color: rgba(209, 250, 229, 0.95) !important;
        }

        .card-status.status-error {
            background: rgba(251, 113, 133, 0.18) !important;
            color: rgba(254, 226, 226, 0.95) !important;
        }

        .card-status.status-warning {
            background: rgba(251, 191, 36, 0.18) !important;
            color: rgba(254, 243, 199, 0.95) !important;
        }

        /* 뷰 토글 다크 테마 */
        .view-toggle {
            background: rgba(2, 6, 23, 0.35) !important;
        }

        .view-btn {
            color: var(--muted) !important;
        }

        .view-btn.active {
            background: rgba(94, 234, 212, 0.18) !important;
            color: var(--primary) !important;
            box-shadow: 0 0 0 1px rgba(94, 234, 212, 0.35) !important;
        }

        .results-info {
            color: var(--muted) !important;
        }

        .results-info strong {

        }

        .table-section h3, .view-controls h3 {

        /* Hero 섹션 다크 테마 */
        .hero-section {

        /* 검색 섹션 다크 테마는 이미 적용됨 */

</head>
<body>
    <div class="dashboard-container">
        <!-- Hero Section: Critical 알림 -->
        <div class="hero-section" id="heroSection" style="display: none;">
            <div class="hero-icon">⚠️</div>
            <div class="hero-content">
                <h2>주의가 필요한 시스템이 있습니다</h2>
                <p id="heroMessage">0개의 Critical 이슈 발견</p>
            </div>
            <button class="hero-action" onclick="filterCritical()">
                자세히 보기 →
            </button>
        </div>

        <!-- Header with Real-time Stats -->
        <div class="header">
            <div class="header-left">
                <h1>DB 점검 모니터링</h1>
                <div class="header-meta">
                    <div class="live-badge">
                        <span class="live-dot"></span>
                        <span>Live</span>
                    </div>
                    <span id="updateTime">업데이트: -</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="quick-stats" id="headerQuickStats">
                    <div class="quick-stat success">
                        <span class="quick-stat-value" id="quickSuccess">0</span>
                        <span class="quick-stat-label">Success</span>
                    </div>
                    <div class="quick-stat warning">
                        <span class="quick-stat-value" id="quickWarning">0</span>
                        <span class="quick-stat-label">Warning</span>
                    </div>
                    <div class="quick-stat error">
                        <span class="quick-stat-value" id="quickError">0</span>
                        <span class="quick-stat-label">Error</span>
                    </div>
                </div>
                <button class="btn btn-refresh" onclick="loadData()">
                    <span>🔄</span> 새로고침
                </button>
            </div>
        </div>

        <!-- Smart Search & Filter Bar -->
        <div class="search-section">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="quickSearch" placeholder="호스트명, 담당자, 경로 검색..." onkeyup="quickSearch()">
                <button class="clear-search" onclick="clearSearch()" style="display: none;">✕</button>
            </div>
            <div class="filter-chips" id="filterChips">
                <button class="filter-chip" data-filter="all" onclick="filterByStatus('all')">
                    전체
                </button>
                <button class="filter-chip" data-filter="success" onclick="filterByStatus('success')">
                    <span class="chip-dot success"></span> Success
                </button>
                <button class="filter-chip" data-filter="error" onclick="filterByStatus('error')">
                    <span class="chip-dot error"></span> Error
                </button>
                <button class="filter-chip" data-filter="warning" onclick="filterByStatus('warning')">
                    <span class="chip-dot warning"></span> Warning
                </button>
            </div>
            <div class="db-type-tabs" id="dbTypeTabs">
                <button class="db-tab active" data-type="all" onclick="filterByType('all')">
                    전체 <span class="tab-count" id="countAll">0</span>
                </button>
                <button class="db-tab" data-type="MARIADB" onclick="filterByType('MARIADB')">
                    MariaDB <span class="tab-count" id="countMariaDB">0</span>
                </button>
                <button class="db-tab" data-type="POSTGRESQL" onclick="filterByType('POSTGRESQL')">
                    PostgreSQL <span class="tab-count" id="countPostgreSQL">0</span>
                </button>
                <button class="db-tab" data-type="CUBRID" onclick="filterByType('CUBRID')">
                    CUBRID <span class="tab-count" id="countCUBRID">0</span>
                </button>
            </div>
        </div>

        <!-- Compact Chart Section -->
        <div class="mini-charts" id="miniCharts" style="display: none;">
            <div class="mini-chart">
                <canvas id="statusChart"></canvas>
            </div>
            <div class="mini-chart">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        
        <!-- Active Filters Display -->
        <div class="active-filters" id="activeFilters" style="display: none;">
            <span class="active-filters-label">활성 필터:</span>
            <div class="active-filters-list" id="activeFiltersList"></div>
            <button class="clear-all-filters" onclick="clearAllFilters()">모두 지우기</button>
        </div>
        
        <div class="table-section">
            <div class="view-controls">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <h3>점검 결과</h3>
                    <div class="results-info" id="resultsInfo">
                        <strong>0</strong>건 표시 중
                    </div>
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" onclick="switchView('card')" id="cardViewBtn">
                        <span>📋</span> 타임라인
                    </button>
                    <button class="view-btn" onclick="switchView('table')" id="tableViewBtn">
                        <span>📊</span> 테이블
                    </button>
                    <button class="view-btn" onclick="toggleCharts()">
                        <span>📈</span> 차트
                    </button>
                </div>
            </div>
            
            <!-- 카드 그리드 뷰 -->
            <div class="results-grid" id="resultsGrid">
                <div class="loading">데이터 로딩 중</div>
            </div>
            
            <!-- 테이블 뷰 -->
            <div class="table-scroll-container" id="tableScrollContainer" style="display: none;">
                <div class="table-scrollbar-top" id="topScrollbar">
                    <div class="table-scrollbar-top-content" id="topScrollbarContent"></div>
                </div>
                <div class="table-wrapper" id="tableWrapper">
                    <div class="loading">데이터 로딩 중</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 오류 상세 정보 모달 -->
    <div class="modal-overlay" id="errorModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>점검 상세 정보</h2>
                <button class="modal-close" onclick="closeErrorModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 상세 정보가 여기에 표시됩니다 -->
            </div>
        </div>
    </div>
    
    <script>
        let currentZoom = 100;
        let ws = null;
        let allData = [];
        let typeChart = null;
        let statusChart = null;
        let trendChart = null;
        let lastPostedStatsKey = '';

        function computeStatusCounts(data) {
            const success = data.filter(r => String(r.상태 || '').toLowerCase().includes('success') && !String(r.상태 || '').toLowerCase().includes('x')).length;
            const warning = data.filter(r => String(r.상태 || '').toLowerCase().includes('warning')).length;
            const error = data.filter(r => String(r.상태 || '').toLowerCase().includes('error') || String(r.상태 || '').toLowerCase().includes('success x')).length;
            return { success, warning, critical: error, total: data.length };
        }

        function postStatsToParent(stats) {
            try {
                if (!window.parent || window.parent === window) return;
                const payload = { type: 'report_stats', source: 'db', ...stats };
                const key = JSON.stringify(payload);
                if (key === lastPostedStatsKey) return;
                lastPostedStatsKey = key;
                window.parent.postMessage(payload, window.location.origin);
            } catch (e) {}
        }

                    if (!hostname.includes(filterHostname)) {

        function applyAllFilters() {
            let filtered = allData;
            
            // 타입 필터
            if (currentTypeFilter !== 'all') {
                filtered = filtered.filter(row => {
                    const rowType = String(row.점검유형 || '').toUpperCase();
                    return rowType === currentTypeFilter.toUpperCase();
                });
            }
            
            // 상태 필터
            if (currentStatusFilter !== 'all') {
                filtered = filtered.filter(row => {
                    const status = String(row.상태 || '').toLowerCase();
                    if (currentStatusFilter === 'error') {
                        return status.includes('error') || status.includes('x');
                    } else if (currentStatusFilter === 'success') {
                        return status.includes('success') && !status.includes('x');
                    } else if (currentStatusFilter === 'warning') {
                        return status.includes('warning');
                    }
                    return true;
                });
            }
            
            // 검색 쿼리
            if (currentSearchQuery) {
                filtered = filtered.filter(row => {
                    const hostname = String(row.호스트명 || '').toLowerCase();
                    const checker = String(row.담당자 || '').toLowerCase();
                    const path1 = String(row.설치경로 || '').toLowerCase();
                    const path2 = String(row.conf경로 || '').toLowerCase();
                    const path3 = String(row.설정경로 || '').toLowerCase();
                    
                    return hostname.includes(currentSearchQuery) ||
                           checker.includes(currentSearchQuery) ||
                           path1.includes(currentSearchQuery) ||
                           path2.includes(currentSearchQuery) ||
                           path3.includes(currentSearchQuery);
                });
            }
            
            currentFilteredData = filtered;
            
            // 렌더링
            if (currentView === 'card') {
                renderCards(filtered);

                renderTable(filtered);

            updateTypeCounts(allData);

        // 차트 업데이트
        function updateCharts(data) {
            // 점검 유형별 분포
            const mariadb = data.filter(r => String(r.점검유형 || '').toUpperCase() === 'MARIADB').length;
            const postgresql = data.filter(r => String(r.점검유형 || '').toUpperCase() === 'POSTGRESQL').length;
            const cubrid = data.filter(r => String(r.점검유형 || '').toUpperCase() === 'CUBRID').length;
            
            typeChart.data.datasets[0].data = [mariadb, postgresql, cubrid];
            typeChart.update();
            
            // 상태별 분포
            const success = data.filter(r => String(r.상태 || '').toLowerCase().includes('success') && !String(r.상태 || '').toLowerCase().includes('x')).length;
            const warning = data.filter(r => String(r.상태 || '').toLowerCase().includes('warning')).length;
            const error = data.filter(r => String(r.상태 || '').toLowerCase().includes('error') || String(r.상태 || '').toLowerCase().includes('success x')).length;
            
            statusChart.data.datasets[0].data = [success, warning, error];
            statusChart.update();
            
            // 일별 추이
            const dateMap = {};
            data.forEach(row => {
                // 원본 날짜 우선 사용 (차트용), 없으면 포맷된 날짜 시도
                const checkTime = row.check_time || row.점검시간;
                if (checkTime) {
                    try {
                        let date;
                        // ISO 8601 형식인 경우 (원본 날짜)
                        if (typeof checkTime === 'string' && (checkTime.includes('T') || checkTime.includes('Z'))) {
                            date = new Date(checkTime);
                        } else {
                            // 포맷된 날짜인 경우 파싱 시도
                            date = new Date(checkTime);
                        }
                        
                        if (!isNaN(date.getTime())) {
                            const dateStr = date.toLocaleDateString('ko-KR', { 
                                year: 'numeric',
                                month: '2-digit', 
                                day: '2-digit' 
                            });
                            dateMap[dateStr] = (dateMap[dateStr] || 0) + 1;
                        }
                    } catch (e) {
                        console.error('Date parsing error:', e, checkTime);
                    }
                }
            });
            
            // 데이터가 없거나 1건일 때 최근 7일 표시
            let dates = Object.keys(dateMap).sort();
            let counts = dates.map(d => dateMap[d]);
            
            if (dates.length === 0 || dates.length === 1) {
                const today = new Date();
                dates = [];
                counts = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toLocaleDateString('ko-KR', { 
                        year: 'numeric',
                        month: '2-digit', 
                        day: '2-digit' 
                    });
                    dates.push(dateStr);
                    counts.push(dateMap[dateStr] || 0);
                }
            }
            
            trendChart.data.labels = dates;
            trendChart.data.datasets[0].data = counts;
            trendChart.update('none'); // 애니메이션 없이 업데이트
        }

        function updateHeaderInfo(count) {

        // 컬럼 결정 (첫 행 기준이 아니라 전체 결과의 union으로 고정)
        // - 최신 결과 타입이 바뀌어도 테이블 컬럼이 흔들리지 않게 함
        // - DB 종류별로 키가 다르더라도 기존 결과가 N/A로 "바뀐 것처럼" 보이지 않게 함
        const COLUMN_PRIORITY = [
            'id',
            '점검유형',
            '호스트명',
            '점검시간',
            '담당자',
            '상태',
            '설치확인',
            '설치경로',
            // DB 공통으로 자주 보는 항목들
            '서비스상태',
            '리스너(MariaDB)',
            '리스너(PostgreSQL)',
            'DB엔진파일시스템',
            '아카이브로그파일시스템',
            '시스템로그파일시스템',
            '파일시스템',
            '디렉토리구조',
            '메모리(Total)',
            '메모리(Used)',
            '메모리(Available)',
            'CPU사용률',
            '프로세스수',
            '데이터베이스수',
            '데이터베이스목록',
            '테이블스페이스',
        ];

        // N/A를 오류로 판단할 때는 "필수 컬럼"만 본다
        // (DB 종류가 섞인 테이블에서 타입별 비해당 컬럼은 N/A가 정상임)
        const CRITICAL_COLUMNS_FOR_NA = ['id', '점검유형', '호스트명', '점검시간', '담당자', '상태'];

        function getUnifiedColumns(results) {
            const colSet = new Set();
            results.forEach(row => {
                if (row && typeof row === 'object') {
                    Object.keys(row).forEach(k => colSet.add(k));
                }
            });

            const cols = Array.from(colSet);
            const priorityIndex = new Map(COLUMN_PRIORITY.map((c, i) => [c, i]));
            cols.sort((a, b) => {
                const ai = priorityIndex.has(a) ? priorityIndex.get(a) : 100000;
                const bi = priorityIndex.has(b) ? priorityIndex.get(b) : 100000;
                if (ai !== bi) return ai - bi;
                // 나머지는 한글/영문 섞여 있어도 안정적으로 정렬
                return String(a).localeCompare(String(b), 'ko');
            });
            return cols;
        }

        // 현재 뷰 모드
        let currentView = 'card'; // 'card' or 'table'
        let currentTypeFilter = 'all';
        let currentStatusFilter = 'all';
        let currentSearchQuery = '';
        
        // 뷰 전환 함수
        function switchView(view) {
            currentView = view;
            const cardViewBtn = document.getElementById('cardViewBtn');
            const tableViewBtn = document.getElementById('tableViewBtn');
            const resultsGrid = document.getElementById('resultsGrid');
            const tableScrollContainer = document.getElementById('tableScrollContainer');
            
            if (view === 'card') {
                cardViewBtn.classList.add('active');
                tableViewBtn.classList.remove('active');
                resultsGrid.style.display = 'flex';
                tableScrollContainer.style.display = 'none';
            } else {
                cardViewBtn.classList.remove('active');
                tableViewBtn.classList.add('active');
                resultsGrid.style.display = 'none';
                tableScrollContainer.style.display = 'block';
            }
            
            // 현재 필터된 데이터로 재렌더링
            if (currentFilteredData.length > 0) {
                if (view === 'card') {
                    renderCards(currentFilteredData);

                    renderTable(currentFilteredData);
                }
            }
        }

        function toggleCharts() {
            const miniCharts = document.getElementById('miniCharts');
            if (miniCharts.style.display === 'none' || !miniCharts.style.display) {
                miniCharts.style.display = 'grid';
            } else {
                miniCharts.style.display = 'none';
            }

        // 카드 렌더링
        function renderCards(results) {
            console.log(`📇 카드 렌더링 시작: ${results.length}개 결과`);
            const resultsGrid = document.getElementById('resultsGrid');
            const resultsInfo = document.getElementById('resultsInfo');
            
            if (results.length === 0) {
                resultsGrid.innerHTML = '<div class="no-data">표시할 데이터가 없습니다.</div>';
                resultsInfo.innerHTML = '<strong>0</strong>건 표시 중';
                return;
            }
            
            resultsInfo.innerHTML = `<strong>${results.length}</strong>건 표시 중`;
            
            let html = '';
            results.forEach((row, index) => {
                const status = String(row.상태 || '').toLowerCase();
                const hasNA = CRITICAL_COLUMNS_FOR_NA.some(col => {
                    const value = row[col];
                    return value === null || value === undefined || value === 'N/A' || value === '';
                });
                const isError = status.includes('error') || status.includes('x') || hasNA;
                const isSuccess = status.includes('success') && !status.includes('x');
                
                const cardClass = isError ? 'error-card' : (isSuccess ? 'success-card' : '');
                const statusClass = isError ? 'status-error' : (isSuccess ? 'status-success' : 'status-warning');
                const statusText = isError ? 'Error' : (isSuccess ? 'Success' : 'Warning');
                
                const dbType = String(row.점검유형 || 'N/A').toUpperCase();
                const badgeClass = dbType === 'MARIADB' ? 'badge-mariadb' : 
                                  (dbType === 'POSTGRESQL' ? 'badge-postgresql' : 'badge-cubrid');
                
                const hostname = row.호스트명 || 'N/A';
                const checker = row.담당자 || 'N/A';
                const checkTime = formatDateTime(row.점검시간);
                const installPath = row.설치경로 || row.conf경로 || 'N/A';
                const servicePath = row.설정경로 || row.서비스경로 || 'N/A';
                const serviceStatus = row.서비스상태 || 'N/A';
                const listening = row['리스닝(MariaDB)'] || row.리스닝 || 'N/A';
                
                const statusIcon = isError ? '❌' : (isSuccess ? '✅' : '⚠️');
                const statusBadgeClass = isError ? 'error' : (isSuccess ? 'success' : 'warning');
                const statusBadgeText = isError ? 'Error' : (isSuccess ? 'OK' : 'Warning');
                
                html += `
                    <div class="result-card ${cardClass}" onclick="showErrorDetails(${index})">
                        <!-- Left: Status Indicator -->
                        <div class="card-status-indicator">
                            <div class="status-icon ${statusBadgeClass}">
                                ${statusIcon}
                            </div>
                            <div class="status-badge-small ${statusBadgeClass}">
                                ${statusBadgeText}
                            </div>
                        </div>

                        <!-- Center: Main Info -->
                        <div class="card-main-info">
                            <div class="card-title-row">
                                <span class="badge card-type-badge ${badgeClass}">${dbType}</span>
                                <div class="card-hostname">${hostname}</div>
                            </div>
                            <div class="card-details-grid">
                                <div class="card-detail-item">
                                    <span class="card-detail-icon">🔧</span>
                                    <div class="card-detail-content">
                                        <div class="card-detail-label">서비스</div>
                                        <div class="card-detail-value">${serviceStatus}</div>
                                    </div>
                                </div>
                                <div class="card-detail-item">
                                    <span class="card-detail-icon">🌐</span>
                                    <div class="card-detail-content">
                                        <div class="card-detail-label">리스닝</div>
                                        <div class="card-detail-value">${listening}</div>
                                    </div>
                                </div>
                                <div class="card-detail-item" style="grid-column: 1 / -1;">
                                    <span class="card-detail-icon">📁</span>
                                    <div class="card-detail-content">
                                        <div class="card-detail-label">설치 경로</div>
                                        <div class="card-detail-value" title="${installPath}">${installPath}</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right: Actions & Meta -->
                        <div class="card-actions">
                            <div class="card-time-badge">
                                🕐 ${checkTime}
                            </div>
                            <div class="card-checker-badge">
                                👤 ${checker}
                            </div>
                            <button class="card-expand-btn" onclick="event.stopPropagation(); showErrorDetails(${index})">
                                ⋯
                            </button>
                        </div>
                    </div>
                `;
            });
            
            resultsGrid.innerHTML = html;
        }
        
        // 날짜 포맷팅 헬퍼
        function formatDateTime(value) {
            if (!value) return 'N/A';
            try {
                const date = new Date(value);
                if (!isNaN(date.getTime())) {
                    return date.toLocaleString('ko-KR', {
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
            } catch (e) {
                return String(value);
            }
            return String(value);
        }
        
        // 테이블 렌더링
        function renderTable(results) {
            console.log(`📊 테이블 렌더링 시작: ${results.length}개 결과`);
            const resultsInfo = document.getElementById('resultsInfo');
            
            if (results.length === 0) {
                console.warn('⚠️ 렌더링할 데이터가 없습니다');
                document.getElementById('tableWrapper').innerHTML = 
                    '<div class="no-data">표시할 데이터가 없습니다.</div>';
                document.getElementById('topScrollbarContent').style.width = '0px';
                resultsInfo.innerHTML = '<strong>0</strong>건 표시 중';
                return;
            }
            
            resultsInfo.innerHTML = `<strong>${results.length}</strong>건 표시 중`;
            
            const columns = getUnifiedColumns(results);
            
            let html = '<table><thead><tr>';
            columns.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            results.forEach((row, index) => {
                const status = String(row.상태 || '').toLowerCase();
                // 오류 판단: error, x 포함, 또는 (필수 컬럼에서) N/A 값이 있는 경우
                const hasNA = CRITICAL_COLUMNS_FOR_NA.some(col => {
                    const value = row[col];
                    return value === null || value === undefined || value === 'N/A' || value === '';
                });
                const isError = status.includes('error') || status.includes('x') || hasNA;
                const rowClass = isError ? 'error-row' : '';
                const rowId = `row-${index}`;
                
                // 모든 행을 클릭 가능하도록 수정 (커서 스타일 추가)
                html += `<tr class="${rowClass}" style="cursor: pointer;" onclick="showErrorDetails(${index})" data-row-index="${index}">`;
                columns.forEach(col => {
                    html += `<td>${formatCell(row[col], col)}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            document.getElementById('tableWrapper').innerHTML = html;
            
            // 스크롤 바 동기화 설정
            syncScrollbars();
        }
        
        // 스크롤 바 동기화 함수 (이벤트 리스너 중복 방지)
        let scrollbarSyncInitialized = false;
        function syncScrollbars() {
            const tableWrapper = document.getElementById('tableWrapper');
            const topScrollbar = document.getElementById('topScrollbar');
            const topScrollbarContent = document.getElementById('topScrollbarContent');
            
            if (!tableWrapper || !topScrollbar || !topScrollbarContent) return;
            
            // 테이블이 렌더링될 때까지 약간의 지연
            setTimeout(() => {
                const table = tableWrapper.querySelector('table');
                if (table) {
                    const tableWidth = table.offsetWidth;
                    const wrapperWidth = tableWrapper.clientWidth;
                    
                    // 스크롤바는 항상 표시하되, 핸들이 확실히 보이도록 최소 1px 오버플로우 보장
                    topScrollbar.style.display = 'block';
                    topScrollbarContent.style.width = Math.max(tableWidth, wrapperWidth + 1) + 'px';
                    
                    // 이벤트 리스너는 한 번만 추가
                    if (!scrollbarSyncInitialized) {
                        // 기존 리스너 제거 후 새로 추가 (중복 방지)
                        const scrollHandler = function() {
                            topScrollbar.scrollLeft = tableWrapper.scrollLeft;
                        };
                        const scrollbarHandler = function() {
                            tableWrapper.scrollLeft = topScrollbar.scrollLeft;
                        };
                        
                        tableWrapper.removeEventListener('scroll', scrollHandler);
                        topScrollbar.removeEventListener('scroll', scrollbarHandler);
                        
                        tableWrapper.addEventListener('scroll', scrollHandler);
                        topScrollbar.addEventListener('scroll', scrollbarHandler);
                        scrollbarSyncInitialized = true;
                    }
                } else {
                    // 테이블이 없으면 스크롤바 숨김
                    topScrollbarContent.style.width = '0px';
                    topScrollbar.style.display = 'none';
                }
            }, 150);
        }
        
        // 셀 포맷팅
        function formatCell(value, columnName) {
            if (value === null || value === undefined || value === 'N/A' || value === '') {
                return '<span style="color: #a0aec0;">N/A</span>';
            }
            
            // 점검유형 배지
            if (columnName === '점검유형') {
                const type = String(value).toUpperCase();
                let badgeClass = '';
                if (type === 'MARIADB') badgeClass = 'badge-mariadb';
                else if (type === 'POSTGRESQL') badgeClass = 'badge-postgresql';
                else if (type === 'CUBRID') badgeClass = 'badge-cubrid';
                return `<span class="badge ${badgeClass}">${value}</span>`;
            }
            
            // 상태 컬럼
            if (columnName === '상태') {
                const status = String(value).toLowerCase();
                if (status.includes('success') && !status.includes('x')) {
                    return `<span class="status-success">${value}</span>`;
                } else if (status.includes('error') || status.includes('x')) {
                    return `<span class="status-error">${value}</span>`;
                } else if (status.includes('warning')) {
                    return `<span class="status-warning">${value}</span>`;
                }
            }
            
            // 설치확인 컬럼
            if (columnName === '설치확인') {
                if (value === '✓' || value === true || String(value).toLowerCase() === 'true') {
                    return '<span class="check-ok">✓</span>';
                } else {
                    return '<span class="check-fail">✗</span>';
                }
            }
            
            // 날짜/시간 포맷팅 (T가 포함되어 있거나 날짜 객체로 변환 가능한 경우)
            if (columnName === '점검시간') {
                try {
                    const date = new Date(value);
                    if (!isNaN(date.getTime())) {
                        return date.toLocaleString('ko-KR');
                    }
                } catch (e) {
                    return String(value);
                }
            }
            
            return String(value);
        }
        
        // WebSocket 연결
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send('ping');
                    }
                }, 30000);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'new_check_result') {
                    loadData();
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
            
            ws.onclose = () => {
                setTimeout(connectWebSocket, 5000);
            };
        }
        
        // 상세 정보 표시 (모든 행 클릭 가능)
        let currentFilteredData = [];
        
        function showErrorDetails(index) {
            const rowData = currentFilteredData[index];
            if (!rowData) return;
            
            const modal = document.getElementById('errorModal');
            const modalBody = document.getElementById('modalBody');
            
            // 원본 데이터 가져오기 (맵에서 찾기)
            let originalData = originalDataMap.get(rowData.id);
            
            // 맵에 없으면 API에서 직접 가져오기
            if (!originalData) {
                fetch(`/api/checks?id=${rowData.id}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.success && data.results && data.results.length > 0) {
                            originalData = data.results[0];
                            originalDataMap.set(originalData.id, originalData);
                            displayErrorDetails(originalData);
                        } else {
                            // 포맷된 데이터로 표시 (원본 데이터가 없는 경우)
                            displayErrorDetails(rowData);
                        }
                    })
                    .catch(err => {
                        console.error('Error fetching original data:', err);
                        // 포맷된 데이터로 표시
                        displayErrorDetails(rowData);
                    });
            } else {
                displayErrorDetails(originalData);
            }
        }
        
        function displayErrorDetails(data) {
            const modalBody = document.getElementById('modalBody');
            // 원본 데이터인지 포맷된 데이터인지 확인
            const isOriginalData = data.results && typeof data.results === 'object' && !Array.isArray(data.results);
            const results = isOriginalData ? data.results : {};
            const checkType = data.check_type || data.점검유형 || 'UNKNOWN';
            
            let html = '';
            
            // 기본 정보
            html += '<div class="detail-section">';
            html += '<h3>기본 정보</h3>';
            html += `<div class="detail-item"><div class="detail-item-label">점검 유형</div><div class="detail-item-value">${checkType.toUpperCase()}</div></div>`;
            html += `<div class="detail-item"><div class="detail-item-label">호스트명</div><div class="detail-item-value">${data.hostname || data.호스트명 || 'N/A'}</div></div>`;
            html += `<div class="detail-item"><div class="detail-item-label">점검 시간</div><div class="detail-item-value">${data.check_time || data.점검시간 || 'N/A'}</div></div>`;
            html += `<div class="detail-item"><div class="detail-item-label">담당자</div><div class="detail-item-value">${data.checker || data.담당자 || 'N/A'}</div></div>`;
            html += `<div class="detail-item ${data.status && data.status.toLowerCase().includes('error') ? 'error-highlight' : 'success-highlight'}"><div class="detail-item-label">상태</div><div class="detail-item-value">${data.status || 'N/A'}</div></div>`;
            html += '</div>';
            
            // 점검 결과 상세 (원본 데이터가 있는 경우만)
            if (isOriginalData && Object.keys(results).length > 0) {
                html += '<div class="detail-section">';
                html += '<h3>점검 결과 상세</h3>';
                
                // results 객체의 모든 항목 표시
                for (const [key, value] of Object.entries(results)) {
                    let displayValue = '';
                    let isError = false;
                    
                    // N/A 값도 표시하되 오류로 강조
                    if (value === null || value === undefined || value === 'N/A' || value === '') {
                        displayValue = 'N/A (값 없음)';
                        isError = true;
                    } else if (typeof value === 'object') {
                        displayValue = JSON.stringify(value, null, 2);
                        // 에러 메시지나 실패 상태 확인
                        if (JSON.stringify(value).toLowerCase().includes('error') || 
                            JSON.stringify(value).toLowerCase().includes('fail')) {
                            isError = true;
                        }
                    } else {
                        displayValue = String(value);
                        if (displayValue.toLowerCase().includes('error') || 
                            displayValue.toLowerCase().includes('fail') ||
                            displayValue === 'N/A') {
                            isError = true;
                        }
                    }
                    
                    const itemClass = isError ? 'error-highlight' : '';
                    html += `<div class="detail-item ${itemClass}">`;
                    html += `<div class="detail-item-label">${key}</div>`;
                    html += `<div class="detail-item-value" style="white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto;">${escapeHtml(displayValue)}</div>`;
                    html += '</div>';
                }
                
                html += '</div>';
            } else {
                // 포맷된 데이터인 경우 테이블의 모든 컬럼 표시
                html += '<div class="detail-section">';
                html += '<h3>점검 결과 상세</h3>';
                
                for (const [key, value] of Object.entries(data)) {
                    // 기본 정보는 이미 표시했으므로 제외
                    if (['id', '점검유형', '호스트명', '점검시간', '담당자', '상태', 'check_type', 'hostname', 'check_time', 'checker', 'status'].includes(key)) {
                        continue;
                    }
                    
                    let displayValue = '';
                    let isError = false;
                    
                    if (value === null || value === undefined || value === 'N/A' || value === '') {
                        displayValue = 'N/A (값 없음)';
                        isError = true;
                    } else if (typeof value === 'object') {
                        displayValue = JSON.stringify(value, null, 2);
                    } else {
                        displayValue = String(value);
                        if (displayValue.toLowerCase().includes('error') || 
                            displayValue.toLowerCase().includes('fail') ||
                            displayValue === 'N/A') {
                            isError = true;
                        }
                    }
                    
                    const itemClass = isError ? 'error-highlight' : '';
                    html += `<div class="detail-item ${itemClass}">`;
                    html += `<div class="detail-item-label">${key}</div>`;
                    html += `<div class="detail-item-value" style="white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto;">${escapeHtml(displayValue)}</div>`;
                    html += '</div>';
                }
                
                html += '</div>';
            }
            
            // 원본 데이터 (디버깅용)
            html += '<div class="detail-section">';
            html += '<h3>📄 원본 데이터 (JSON)</h3>';
            html += `<div class="detail-item"><div class="detail-item-value" style="max-height: 300px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; font-size: 12px;">${escapeHtml(JSON.stringify(data, null, 2))}</div></div>`;
            html += '</div>';
            
            modalBody.innerHTML = html;
            document.getElementById('errorModal').classList.add('active');
        }
        
        function closeErrorModal() {
            document.getElementById('errorModal').classList.remove('active');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 모달 외부 클릭 시 닫기
        document.addEventListener('click', (e) => {
            const modal = document.getElementById('errorModal');
            if (e.target === modal) {
                closeErrorModal();
            }
        });
        
        // ESC 키로 모달 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeErrorModal();
            }
        });
        
        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            loadData();
            connectWebSocket();
            setInterval(loadData, 30000);
        });
    </script>
</body>
</html>
