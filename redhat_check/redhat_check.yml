---
- name: "Redhat OS 점검 및 API 전송"
  hosts: all
  become: no
  gather_facts: yes

  # API 설정 파일 로드 (없어도 기본값 사용)
  pre_tasks:
    - name: Load API config if exists
      include_vars:
        file: ../config/api_config.yml
      failed_when: false
      ignore_errors: yes
    
    # 로컬 PC의 호스트명 가져오기 (로컬 점검 구분용)
    - name: Get local machine hostname
      shell: hostname
      register: local_hostname
      delegate_to: localhost
      run_once: true
      changed_when: false
      failed_when: false
    
    # 점검 대상 서버의 호스트명 가져오기 (로컬 점검인지 확인용)
    - name: Get target server hostname
      shell: hostname
      register: target_hostname
      changed_when: false
      failed_when: false
    
    # 호스트명 자동 설정: 
    # - ansible_hostname_display 변수가 있으면 우선 사용 (hosts.ini에서 지정한 커스텀 호스트명)
    # - 원격 서버 점검 시 → inventory_hostname 사용 (nimbus-server, dongguk_server1 등)
    # - 로컬 점검 시 → 실행 PC 호스트명 기반으로 설정
    - name: Set hostname based on inventory or execution PC
      set_fact:
        auto_hostname: "{{ ansible_hostname_display | default(inventory_hostname if target_hostname.stdout != local_hostname.stdout else ('Taehwan' if 'DESKTOP-JAC7QHN' in local_hostname.stdout else ('Hana-PC' if 'Hana' in local_hostname.stdout or 'hana' in local_hostname.stdout else inventory_hostname))) }}"
      run_once: true

  vars:
    # config 파일이 없을 경우 기본값
    api_server:
      url: "{{ api_server.url | default('http://192.168.0.18:8000/api/checks') }}"
      timeout: "{{ api_server.timeout | default(30) }}"
      retry_count: "{{ api_server.retry_count | default(3) }}"

  roles:
    - redhat_check

  # role 실행 후 API 전송
  post_tasks:
    - name: Include API sender tasks
      include_tasks: "{{ playbook_dir }}/../common/roles/api_sender/tasks/main.yml"
      vars:
        check_type: "os"
        checker_name: "강하나"
        hostname: "{{ auto_hostname | default(inventory_hostname) }}"
        check_results: "{{ redhat_check_results }}"


